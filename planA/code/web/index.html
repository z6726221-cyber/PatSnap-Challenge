<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>芽懂 · 智慧芽技术知识助手</title>
<style>
  :root{
    color-scheme: light;
    --bg:#efe9df; --ink:#2a2d29; --muted:#847f76;
    --paper:#fffaf3; --side:#f8f1e8; --panel:#fffdf9;
    --dark:#2f342f; --green:#4a7a5f; --green-soft:#eef2ec;
    --gold:#b98a3c; --coral:#c06148;
    --line:#2a2d29; --soft:rgba(42,45,41,.13); --hair:rgba(42,45,41,.06);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif;
       background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
  .app{max-width:1200px;height:calc(100vh - 40px);margin:20px auto;background:var(--panel);
       border:2px solid var(--line);border-radius:16px;overflow:hidden;display:grid;
       grid-template-columns:232px 1fr;box-shadow:10px 12px 0 rgba(28,38,33,.09)}

  /* Sidebar */
  .side{background:var(--side);display:flex;flex-direction:column;border-right:1.5px solid var(--soft);padding:18px 14px}
  .brand{font-size:16px;font-weight:800;color:var(--dark);margin-bottom:4px}
  .brand small{display:block;font-size:11.5px;font-weight:500;color:var(--muted);margin-top:3px}
  .nav{margin-top:20px}
  .nav .label{font-size:11px;color:var(--muted);font-weight:700;margin:0 0 8px 4px;letter-spacing:.5px}
  .nav button{display:block;width:100%;text-align:left;margin:6px 0;padding:11px 12px;
       border:1.5px solid var(--soft);border-radius:10px;background:#fff;cursor:pointer;
       font-size:13.5px;font-weight:600;color:var(--ink);transition:.12s}
  .nav button:hover{border-color:var(--line)}
  .nav button.on{background:var(--dark);color:#fff;border-color:var(--line);box-shadow:2px 3px 0 rgba(28,38,33,.15)}
  .side .foot{margin-top:auto;font-size:11px;color:var(--muted);line-height:1.6}

  /* Main */
  .main{display:flex;flex-direction:column;min-width:0}
  .topbar{padding:12px 20px;border-bottom:1.5px solid var(--soft);display:flex;align-items:center;gap:12px}
  .topbar .case-sel{font-size:13px;color:var(--ink);padding:7px 10px;border:1.5px solid var(--soft);
       border-radius:9px;background:#fff;flex:1;max-width:520px}
  .banner{margin:0 20px;margin-top:10px;padding:8px 12px;background:#faeee6;border:1.5px solid var(--coral);
       color:var(--coral);border-radius:9px;font-size:12.5px;display:none}
  .banner.show{display:block}

  .chat{flex:1;overflow-y:auto;padding:22px 20px}
  .msg{max-width:800px;margin:12px 0;padding:13px 16px;border-radius:13px;line-height:1.65;font-size:14px}
  .msg.user{background:var(--dark);color:#fff;margin-left:auto;max-width:70%;border-radius:13px 13px 3px 13px}
  .msg.bot{background:var(--paper);border:1.5px solid var(--line);box-shadow:3px 4px 0 rgba(28,38,33,.07)}
  .msg.bot .src{font-size:12px;color:var(--muted);margin-top:10px;padding-top:8px;border-top:1px dashed var(--soft)}
  .msg.bot .conflict{font-size:12.5px;color:var(--gold);margin-top:8px;padding:7px 10px;
       background:#faf4e7;border-left:3px solid var(--gold);border-radius:0 7px 7px 0}
  .msg.bot table{border-collapse:collapse;margin:10px 0;width:100%;font-size:13px}
  .msg.bot th,.msg.bot td{border:1px solid var(--soft);padding:8px 10px;text-align:left;vertical-align:top}
  .msg.bot th{background:var(--green-soft);color:var(--dark);font-weight:700}
  .trace{font-size:11.5px;color:var(--muted);margin-top:8px}
  .trace summary{cursor:pointer}
  .trace code{background:var(--hair);padding:1px 5px;border-radius:4px}

  .inbar{display:flex;gap:10px;padding:14px 20px;border-top:1.5px solid var(--soft);background:var(--side)}
  .inbar textarea{flex:1;padding:11px 13px;border:1.5px solid var(--soft);border-radius:11px;
       font-size:14px;resize:none;font-family:inherit;height:44px;background:#fff}
  .inbar textarea:focus{outline:none;border-color:var(--line)}
  .inbar button{padding:0 22px;background:var(--dark);color:#fff;border:none;border-radius:11px;
       cursor:pointer;font-size:14px;font-weight:700;box-shadow:2px 3px 0 rgba(28,38,33,.15)}
  .inbar button:disabled{opacity:.5;cursor:wait}
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand">芽懂 🌱<small>智慧芽技术知识助手</small></div>
    <div class="nav">
      <p class="label">能力</p>
      <button data-mode="qa" class="on">💬 技术问答<br><span style="font-weight:400;font-size:11.5px;color:inherit;opacity:.75">统一口径 · 带出处</span></button>
      <button data-mode="comparison">⚔️ 竞品分析<br><span style="font-weight:400;font-size:11.5px;color:inherit;opacity:.75">按维度对齐成表</span></button>
      <button data-mode="promo">✍️ 宣传生成<br><span style="font-weight:400;font-size:11.5px;color:inherit;opacity:.75">贴风格 · 附来源</span></button>
    </div>
    <div class="foot">资料由检索系统召回<br>答案均可溯源 · 无来源标"待核实"</div>
  </aside>

  <main class="main">
    <div class="topbar">
      <span style="font-size:12.5px;color:var(--muted);white-space:nowrap">检索资料集</span>
      <select class="case-sel" id="caseSel"></select>
    </div>
    <div class="banner" id="banner"></div>
    <div class="chat" id="chat"></div>
    <div class="inbar">
      <textarea id="input" placeholder="选一个资料集，点发送用当前资料生成；或直接输入问题…"></textarea>
      <button id="send">发送</button>
    </div>
  </main>
</div>

<script>
let mode = "qa";
const chat = document.getElementById("chat");
const caseSel = document.getElementById("caseSel");
const banner = document.getElementById("banner");

document.querySelectorAll(".nav button").forEach(b => b.onclick = () => {
  document.querySelectorAll(".nav button").forEach(x => x.classList.remove("on"));
  b.classList.add("on"); mode = b.dataset.mode;
});

// 加载可选 case
let CASES = [];
fetch("/api/cases").then(r => r.json()).then(d => {
  CASES = d.cases || [];
  caseSel.innerHTML = CASES.map(c => `<option value="${c.case}">${c.case} — ${c.question}</option>`).join("");
}).catch(() => { caseSel.innerHTML = "<option>（后端未连接）</option>"; });

function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function bubble(cls, html){
  const d = document.createElement("div");
  d.className = "msg " + cls; d.innerHTML = html;
  chat.appendChild(d); chat.scrollTop = chat.scrollHeight; return d;
}

// 把 Agent 输出的 markdown 表格 + 📎🕐⚠ 标记渲染成 HTML
function render(text){
  let html = esc(text);
  // markdown 表格 → <table>
  html = html.replace(/((?:^\|.*\|\s*$\n?)+)/gm, block => {
    const rows = block.trim().split("\n").filter(r => r.trim().startsWith("|"));
    if (rows.length < 2) return block;
    let out = "<table>";
    rows.forEach((r, i) => {
      if (/^\|[\s\-:|]+\|$/.test(r.trim())) return; // 分隔行
      const cells = r.split("|").slice(1, -1).map(c => c.trim());
      const tag = i === 0 ? "th" : "td";
      out += "<tr>" + cells.map(c => `<${tag}>${c}</${tag}>`).join("") + "</tr>";
    });
    return out + "</table>";
  });
  // 冲突提示行
  html = html.replace(/^⚠\s?(.+)$/gm, '<div class="conflict">⚠ $1</div>');
  // 来源行
  html = html.replace(/^(📎.+)$/gm, '<div class="src">$1</div>');
  return html.replace(/\n/g, "<br>");
}

document.getElementById("send").onclick = send;
document.getElementById("input").addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});

async function send(){
  const sendBtn = document.getElementById("send");
  const caseName = caseSel.value;
  const typed = document.getElementById("input").value.trim();
  const c = CASES.find(x => x.case === caseName);
  const shown = typed || (c ? c.question : caseName);
  bubble("user", esc(shown));
  document.getElementById("input").value = "";
  banner.classList.remove("show");
  const loading = bubble("bot", "思考中…");
  sendBtn.disabled = true;

  try {
    const r = await fetch("/api/chat", {
      method: "POST", headers: {"Content-Type": "application/json"},
      body: JSON.stringify({mode, case: caseName})
    });
    const data = await r.json();
    if (data.error){ loading.innerHTML = "⚠ " + esc(data.error); return; }
    if (data.degraded){
      banner.textContent = "⚠️ 降级演示：实时链路不可用，展示预置结果" +
        (data.degraded_reason ? "（" + data.degraded_reason + "）" : "");
      banner.classList.add("show");
    }
    let html = render(data.text);
    if (data.trace && data.trace.length){
      const steps = data.trace.map(t => `<code>${esc(t.tool)}</code>`).join(" → ");
      html += `<details class="trace"><summary>执行轨迹（${data.trace.length} 步）</summary>${steps}</details>`;
    }
    loading.innerHTML = html;
  } catch (e) {
    loading.innerHTML = "请求失败：" + esc(String(e));
  } finally {
    sendBtn.disabled = false;
  }
}
</script>
</body>
</html>
